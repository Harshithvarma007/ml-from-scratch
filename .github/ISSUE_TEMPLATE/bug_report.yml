name: Bug report
description: Something is broken — a widget, a derivation, a broken link, a UI glitch.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more detail you give, the faster it gets fixed.

  - type: input
    id: url
    attributes:
      label: Page or lesson URL
      description: e.g. `/learn/math-foundations/gradient-descent` or `/learn/build-a-neural-net/backprop-ninja`
      placeholder: /learn/...
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. Include what you expected to happen vs what actually happened.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Navigate to ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Widget not working / wrong output
        - Math / derivation error
        - Broken layout or UI glitch
        - Mobile / responsive issue
        - Broken link or 404
        - TypeScript error
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser + OS
      placeholder: e.g. Chrome 124 on macOS 14

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, console errors, or anything else useful.
